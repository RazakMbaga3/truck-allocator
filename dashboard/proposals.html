<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proposals — Truck Allocator</title>
  <link rel="stylesheet" href="/static/css/nyati.css" />
  <style>
    .variant-badge { display:inline-block; padding:2px 10px; border-radius:4px; font-size:0.75rem;
                     font-weight:700; letter-spacing:0.03em; }
    .v-best   { background:#e8f4fd; color:#1a6fa8; }
    .v-load   { background:#fef3e8; color:#c05a00; }
    .v-urgent { background:#fce8e8; color:#b91c1c; }
    .proposal-card { border:1px solid #e5e7eb; border-radius:8px; overflow:hidden; }
    .proposal-card-header { padding:0.75rem 1.25rem; display:flex; justify-content:space-between;
                            align-items:center; }
    .h-best   { background:#173158; color:#fff; }
    .h-load   { background:#F49545; color:#fff; }
    .h-urgent { background:#dc2626; color:#fff; }
    .proposal-card-body { padding:1.25rem; }
    .metric-row { display:flex; justify-content:space-between; margin-bottom:0.5rem;
                  font-size:0.88rem; }
    .metric-label { color:#6b7280; }
    .metric-value { font-weight:600; }
    .proposals-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
                      gap:1rem; margin-bottom:1.5rem; }
    .warning-banner { background:#fef3cd; border:1px solid #f5c842; border-radius:4px;
                      padding:0.5rem 0.75rem; color:#854d0e; font-size:0.8rem; margin-top:0.5rem; }
    .order-list { margin-top:0.75rem; font-size:0.82rem; }
    .order-item { display:flex; justify-content:space-between; padding:0.3rem 0;
                  border-bottom:1px solid #f3f4f6; }
    .order-item:last-child { border-bottom:none; }
    .info-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:1rem; }
    .info-cell-label { font-size:0.7rem; font-weight:600; text-transform:uppercase;
                       color:#9ca3af; margin-bottom:0.2rem; }
    .info-cell-value { font-weight:600; }
    .ai-panel { background:#f8fafc; border:1px solid #e2e8f0; border-radius:8px;
                padding:1.25rem; margin-top:1rem; }
    .ai-panel-title { font-size:0.75rem; font-weight:700; letter-spacing:0.05em;
                      color:#64748b; margin-bottom:0.75rem; }
    .proposal-first-row td { border-top:2px solid #e2e8f0; }
    .proposal-cont-row td { border-top:1px solid #f3f4f6; }
  </style>
</head>
<body>

<header class="topbar">
  <div class="topbar-logo"><span>TRUCK</span>&nbsp;<span class="accent">ALLOCATOR</span></div>
  <nav class="topbar-nav">
    <a href="/">Schedule</a>
    <a href="/proposals" class="active">Proposals</a>
    <a href="/confirmed">Confirmed</a>
  </nav>
  <div class="topbar-status">
    <div class="live-dot"></div>
    <span id="sse-status">Connecting…</span>
  </div>
</header>

<main class="page">
  <div id="page-content">
    <div class="empty-state" id="loading-state">
      <div class="spinner" style="width:32px;height:32px;border-width:3px"></div>
      <div style="margin-top:1rem;color:var(--gray-400)">Loading proposals…</div>
    </div>
  </div>
</main>

<div id="toast-container"></div>

<script src="/static/js/api.js"></script>
<script src="/static/js/schedule-feed.js"></script>
<script>
const params = new URLSearchParams(location.search);
const scheduleId = params.get('schedule');

document.addEventListener('DOMContentLoaded', () => {
  if (scheduleId) {
    loadScheduleProposals(parseInt(scheduleId));
  } else {
    loadAllProposals();
  }
  const feed = new ScheduleFeed(handleSSEEvent);
  feed.connect();
});

// ── All proposals list ─────────────────────────────────────────────────────
async function loadAllProposals() {
  try {
    const props = await API.proposals('?status=proposed');
    if (!props.length) {
      document.getElementById('page-content').innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">📋</div>
          <div class="empty-state-title">No pending proposals</div>
          <div>All proposals have been confirmed or no trucks have been matched yet.</div>
          <a href="/" class="btn btn-primary" style="margin-top:1rem">← Back to Schedule</a>
        </div>`;
      return;
    }

    // Build one row per order item; group rows under each proposal
    let rows = '';
    for (const p of props) {
      const orderItems = p.items && p.items.length ? p.items : [null];
      orderItems.forEach((item, idx) => {
        const isFirst = idx === 0;
        const customer   = item?.customer_name   || '—';
        const orderRef   = item?.order_name       || '—';
        const orderDate  = item?.order_date        ? fmtDate(item.order_date) : '—';
        const product    = item?.product_name      ? shortProduct(item.product_name) : '—';
        const qty        = item?.quantity_tonnes != null ? item.quantity_tonnes.toFixed(1) + ' T' : '—';
        const district   = item?.delivery_zone    || '—';
        const region     = item?.delivery_region  || '—';

        rows += `
          <tr class="${isFirst ? 'proposal-first-row' : 'proposal-cont-row'}">
            <td>${customer}</td>
            <td class="mono" style="font-size:0.8rem">${orderRef}</td>
            <td style="white-space:nowrap">${orderDate}</td>
            <td style="font-size:0.8rem">${product}</td>
            <td style="white-space:nowrap">${qty}</td>
            <td>${district}</td>
            <td>${region}</td>
            ${isFirst ? `
            <td rowspan="${orderItems.length}" style="vertical-align:middle;text-align:center">
              ${variantBadge(p.variant_type)}
            </td>
            <td rowspan="${orderItems.length}" style="vertical-align:middle;text-align:center">
              ${aiRecBadge(p.ai_recommendation)}
            </td>
            <td rowspan="${orderItems.length}" style="vertical-align:middle;text-align:center">
              <button class="btn btn-green btn-sm" onclick="confirmProposal(${p.id}, '${p.proposal_ref}')">
                ✓ Confirm
              </button>
            </td>` : ''}
          </tr>`;
      });
    }

    const totalOrders = props.reduce((n, p) => n + (p.items ? p.items.length : 0), 0);

    const html = `
      <div class="page-header">
        <div class="page-title">Pending Allocation Proposals</div>
        <div class="page-subtitle">${props.length} proposals · ${totalOrders} orders awaiting confirmation</div>
      </div>
      <div class="card">
        <div class="card-body">
          <table class="data-table">
            <thead>
              <tr>
                <th>Customer</th>
                <th>Order Reference</th>
                <th>Order Date</th>
                <th>Product</th>
                <th>Quantity</th>
                <th>Location / District</th>
                <th>Region</th>
                <th>Variant</th>
                <th>AI Rec.</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>`;
    document.getElementById('page-content').innerHTML = html;
  } catch (e) {
    console.error(e);
    document.getElementById('page-content').innerHTML =
      `<div class="empty-state"><div class="empty-state-title">Error: ${e.message}</div></div>`;
  }
}

function shortProduct(name) {
  if (!name) return '—';
  // Shorten long product names for table display
  return name.replace('CEM II A–L', 'CEM II A-L').replace('CEM II B-M', 'CEM II B-M').slice(0, 20);
}

// ── Single schedule proposals ──────────────────────────────────────────────
async function loadScheduleProposals(sid) {
  try {
    const [schedule, props] = await Promise.all([
      API.schedule(sid),
      API.proposals(`?schedule_id=${sid}&status=proposed`),
    ]);
    renderScheduleDetail(schedule, props);
  } catch (e) {
    document.getElementById('page-content').innerHTML =
      `<div class="empty-state"><div class="empty-state-title">Error: ${e.message}</div></div>`;
  }
}

function renderScheduleDetail(schedule, props) {
  const proposalCards = props.length
    ? props.map(p => renderProposalCard(p)).join('')
    : `<div class="card" style="padding:2rem;text-align:center;color:var(--gray-400)">
         <div class="spinner"></div>
         <div style="margin-top:0.75rem">Running matching engine… refresh in a moment.</div>
       </div>`;

  const routeStr = (schedule.return_route || []).slice(0, 5).join(' → ') || '—';

  const html = `
    <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start">
      <div>
        <div class="page-title">
          <a href="/" style="color:var(--gray-400);font-weight:400">← Schedule</a>
          &nbsp;/&nbsp; ${schedule.schedule_ref}
        </div>
        <div class="page-subtitle">
          ${schedule.origin_region} · ETA ${fmtDate(schedule.expected_arrival_dt)}
          · Est. ${Math.round(schedule.estimated_qty_tonnes)}T
          · PO: ${schedule.odoo_po_name || '—'}
        </div>
      </div>
      <button class="btn btn-outline btn-sm" onclick="rematchSchedule(${schedule.id})">⟳ Re-match</button>
    </div>

    <!-- Truck info banner -->
    <div class="card" style="margin-bottom:1.25rem">
      <div class="card-body" style="padding:1rem 1.25rem">
        <div class="info-grid">
          ${infoCell('Transporter', schedule.transporter_name || '—')}
          ${infoCell('Truck No.', schedule.truck_plate || '—')}
          ${infoCell('Driver', schedule.driver_name || '—')}
          ${infoCell('License No.', schedule.driver_license_no || '—')}
          ${infoCell('Dealer No.', schedule.dealer_number || '—')}
          ${infoCell('Origin', schedule.origin_region)}
          ${infoCell('Route', schedule.corridor_name || '—')}
          ${infoCell('Status', schedule.status)}
        </div>
        ${routeStr !== '—' ? `<div style="margin-top:0.75rem;font-size:0.8rem;color:#6b7280">Return route: ${routeStr}</div>` : ''}
      </div>
    </div>

    <div class="page-header"><div class="page-title">Allocation Proposals</div></div>
    <div class="proposals-grid" id="proposals-grid">
      ${proposalCards}
    </div>

    <div id="ai-panel-container"></div>`;

  document.getElementById('page-content').innerHTML = html;

  if (props.length) {
    loadAIReasoning(props[0].id);
  }
}

function renderProposalCard(p) {
  const variantMeta = {
    BEST_MATCH:   { label: '★ Best Match',   hClass: 'h-best' },
    MAX_SAVINGS:  { label: '★ Best Match',   hClass: 'h-best' },
    MAX_LOAD:     { label: '⬛ Max Load',     hClass: 'h-load' },
    URGENT_FIRST: { label: '⚡ Urgent First', hClass: 'h-urgent' },
  };
  const meta = variantMeta[p.variant_type] || { label: p.variant_type, hClass: 'h-load' };

  return `
    <div class="proposal-card" id="prop-card-${p.id}">
      <div class="proposal-card-header ${meta.hClass}">
        <span style="font-weight:700;font-size:0.9rem">${meta.label}</span>
        <span style="font-size:0.75rem;opacity:0.85">${p.proposal_ref}</span>
      </div>
      <div class="proposal-card-body">
        <div class="metric-row">
          <span class="metric-label">Utilization</span>
          <span class="metric-value">${p.capacity_utilization_pct.toFixed(0)}%</span>
        </div>
        <div class="metric-row">
          <span class="metric-label">Stops</span>
          <span class="metric-value">${p.number_of_stops} stop${p.number_of_stops !== 1 ? 's' : ''}</span>
        </div>
        ${p.has_pending_readiness_orders
          ? `<div class="warning-banner">⚡ Contains near-ready orders — confirm dispatch readiness before confirming.</div>`
          : ''}
        <div style="margin-top:0.25rem">${aiRecBadge(p.ai_recommendation)}</div>
        <div style="margin-top:1rem;display:flex;gap:0.5rem">
          <button class="btn btn-green" style="flex:1" onclick="confirmProposal(${p.id}, '${p.proposal_ref}')">
            ✓ Confirm
          </button>
          <button class="btn btn-outline btn-sm" onclick="loadAIReasoning(${p.id})">AI ▸</button>
        </div>
      </div>
    </div>`;
}

function infoCell(label, value) {
  return `<div>
    <div class="info-cell-label">${label}</div>
    <div class="info-cell-value">${value}</div>
  </div>`;
}

// ── AI reasoning ───────────────────────────────────────────────────────────
async function loadAIReasoning(proposalId) {
  const container = document.getElementById('ai-panel-container');
  if (!container) return;
  container.innerHTML = '<div class="ai-panel"><div class="ai-panel-title">AI ADVISOR</div><div class="spinner"></div></div>';

  for (let i = 0; i < 10; i++) {
    try {
      const data = await API.get(`/api/proposals/${proposalId}/ai-reasoning`);
      if (data.ready) {
        container.innerHTML = `
          <div class="ai-panel">
            <div class="ai-panel-title">AI ADVISOR — Claude</div>
            <p style="font-size:0.9rem;line-height:1.6">${data.ai_reasoning}</p>
            ${data.ai_warnings.length
              ? `<ul style="margin-top:0.75rem;padding-left:1.2rem;font-size:0.85rem">${data.ai_warnings.map(w => `<li>⚠ ${w}</li>`).join('')}</ul>`
              : ''}
            ${data.ai_recommendation
              ? `<div style="margin-top:0.75rem">${aiRecBadge(data.ai_recommendation)}</div>`
              : ''}
          </div>`;
        return;
      }
    } catch (e) { break; }
    await new Promise(r => setTimeout(r, 3000));
  }
  container.innerHTML = '<div class="ai-panel"><div class="ai-panel-title">AI ADVISOR</div><span style="color:var(--gray-400);font-size:0.85rem">AI reasoning not yet available.</span></div>';
}

// ── Confirm ────────────────────────────────────────────────────────────────
async function confirmProposal(proposalId, proposalRef) {
  if (!confirm(`Confirm allocation ${proposalRef}?\n\nThis will:\n• Allocate the truck\n• Mark orders as allocated\n• Create Odoo delivery orders`)) return;
  try {
    const result = await API.confirmProposal(proposalId);
    showToast(`${result.proposal_ref} confirmed — ${result.orders_allocated} orders allocated`, 'green');
    setTimeout(() => location.href = '/', 1500);
  } catch (e) {
    showToast('Confirmation failed: ' + e.message, 'orange');
  }
}

// ── Re-match ───────────────────────────────────────────────────────────────
async function rematchSchedule(sid) {
  showToast('Running re-match…');
  try {
    const result = await API.rematch(sid);
    showToast(`Re-match complete: ${result.proposals_generated} proposals`, 'green');
    loadScheduleProposals(sid);
  } catch (e) {
    showToast('Re-match failed: ' + e.message, 'orange');
  }
}

// ── Helpers ────────────────────────────────────────────────────────────────
function variantBadge(v) {
  const map = { BEST_MATCH:'v-best', MAX_SAVINGS:'v-best', MAX_LOAD:'v-load', URGENT_FIRST:'v-urgent' };
  return `<span class="variant-badge ${map[v]||'v-load'}">${v.replace('_',' ')}</span>`;
}

function aiRecBadge(rec) {
  if (!rec) return '';
  const map = { CONFIRM:'confirm', REVIEW:'review', HOLD:'hold' };
  return `<span class="ai-recommendation ai-recommend-${map[rec]||'review'}">🤖 ${rec}</span>`;
}

function handleSSEEvent(type, data) {
  if (type === 'truck_allocated') {
    showToast(`Truck ${data.schedule_ref} allocated`, 'green');
  }
}
</script>
</body>
</html>
