services:
  - type: web
    name: truck-allocator
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: truck-allocator-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: truck-allocator-db
    databaseName: truck_allocator
    user: truck_allocator
    plan: free
